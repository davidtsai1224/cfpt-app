<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>KPM 姿態分析系統 - 終極修正版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; display: flex; flex-direction: column; }
        #status-monitor { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; z-index: 100; font-size: 16px; border: 2px solid #0f0; border-radius: 10px; pointer-events: none; }
        .container { position: relative; flex: 1; display: flex; justify-content: center; align-items: center; background: #000; overflow: hidden; }
        #output_canvas { max-width: 100%; max-height: 100%; object-fit: contain; transform: scaleX(-1); } 
        #input_video { display: none; }
        #start-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 20px; background: #0f0; color: #000; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; z-index: 101; box-shadow: 0 0 20px rgba(0,255,0,0.5); }
    </style>
</head>
<body>
    <div id="status-monitor">
        <div style="font-weight: bold; color: #fff; margin-bottom: 5px;">KPM POSTURE AI v1.1</div>
        <div id="step-info">等待啟動...</div>
        <hr border="0" style="border-top: 1px solid #333; margin: 10px 0;">
        <div id="angle-info" style="font-size: 22px; color: #ffff00; white-space: pre-line;">數據計算中...</div>
    </div>

    <button id="start-btn">開始臨床檢測</button>
    
    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script type="module">
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const btn = document.getElementById('start-btn');
        const stepInfo = document.getElementById('step-info');
        const angleInfo = document.getElementById('angle-info');

        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`;
        }});

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
            stepInfo.innerText = "● 臨床數據偵測中";
            
            if (canvasElement.width !== results.image.width) {
                canvasElement.width = results.image.width;
                canvasElement.height = results.image.height;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                const landmarks = results.poseLandmarks;
                
                // 1. 取得點位 (11: 受測者左肩, 12: 受測者右肩)
                const L = landmarks[11]; 
                const R = landmarks[12]; 

                // 2. 計算角度 (dy, dx)
                // 注意：在瀏覽器座標系，Y 越小越高。
                const dy = L.y - R.y; 
                const dx = L.x - R.x;
                // 使用 Math.atan2 算角度，並轉為度數
                const rawAngle = Math.atan2(dy, dx) * 180 / Math.PI;
                const angleDeg = Math.abs(rawAngle).toFixed(1);

                // 3. 核心判定邏輯：直接比 Y 值 (誰小誰就高)
                let sideStatus = "肩部水平";
                if (R.y < L.y - 0.005) { // 預留一點點誤差容許度
                    sideStatus = "【受測者：右肩較高】";
                } else if (L.y < R.y - 0.005) {
                    sideStatus = "【受測者：左肩較高】";
                }

                // 4. 繪製骨架與基準線
                drawConnectors(canvasCtx, landmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 5});

                // 畫一條穿過右肩的水平參考線
                canvasCtx.beginPath();
                canvasCtx.setLineDash([10, 10]);
                canvasCtx.moveTo(0, R.y * canvasElement.height);
                canvasCtx.lineTo(canvasElement.width, R.y * canvasElement.height);
                canvasCtx.strokeStyle = 'yellow';
                canvasCtx.stroke();

                // 5. 顯示數據
                angleInfo.innerText = `偏移角度: ${angleDeg}°\n${sideStatus}`;
            }
            canvasCtx.restore();
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 1280, height: 720
        });

        btn.onclick = () => {
            btn.style.display = 'none';
            stepInfo.innerText = "● 啟動相機中...";
            camera.start().then(() => { stepInfo.innerText = "● 運作中"; });
        };
    </script>
</body>
</html>
