<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KPM 姿態偏移分析</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; }
    .status-box { padding: 10px; background: rgba(0,0,0,0.7); position: fixed; top: 0; width: 100%; z-index: 10; }
    #output_canvas { width: 100vw; height: 100vh; object-fit: contain; }
    #input_video { display: none; }
  </style>
</head>
<body>
  <div class="status-box">
    <div id="status">正在準備環境...</div>
    <div id="sub-status" style="font-size: 12px; color: #ccc;">正在檢查相機與模型連線</div>
  </div>

  <video id="input_video" playsinline></video>
  <canvas id="output_canvas"></canvas>

  <script type="module">
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('status');
    const subStatusText = document.getElementById('sub-status');

    function onResults(results) {
      statusText.innerText = "KPM AI 運作中";
      subStatusText.innerText = results.poseLandmarks ? "已偵測到骨架" : "請將全身放入鏡頭中";
      
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.poseLandmarks) {
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
        drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2, radius: 5});
      }
      canvasCtx.restore();
    }

    // 使用絕對版本號的路徑，避免載入錯誤
    const pose = new Pose({locateFile: (file) => {
      const url = `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`;
      subStatusText.innerText = `載入模型組件: ${file}`;
      return url;
    }});

    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    pose.onResults(onResults);

    // 啟動相機
    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await pose.send({image: videoElement});
      },
      width: 1280,
      height: 720
    });

    statusText.innerText = "請點擊畫面以啟動相機";
    
    // 增加點擊啟動機制，解決 iOS 自動播放限制
    window.onclick = () => {
        statusText.innerText = "正在啟動相機...";
        camera.start().then(() => {
            statusText.innerText = "相機已啟動，載入 AI 模型中...";
        }).catch(err => {
            statusText.innerText = "相機啟動失敗";
            subStatusText.innerText = err;
        });
    };
  </script>
</body>
</html>
