<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>KPM 側面分析 - 測試版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #status-monitor { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.85); padding: 15px; z-index: 100; font-size: 16px; border: 2px solid #0f0; border-radius: 12px; min-width: 260px; box-shadow: 0 4px 15px rgba(0,255,0,0.3); }
        .container { position: relative; flex: 1; display: flex; justify-content: center; align-items: center; background: #000; }
        #output_canvas { max-width: 100%; max-height: 100%; object-fit: contain; transform: scaleX(-1); } 
        #input_video { display: none; }
        #start-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 20px; background: #0f0; color: #000; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; z-index: 101; }
        
        /* 標準化參考線 */
        .guide-line { position: absolute; left: 0; width: 100%; border-top: 1px dashed rgba(255, 255, 255, 0.6); z-index: 90; display: flex; justify-content: center; }
        .guide-text { background: rgba(0, 0, 0, 0.5); padding: 2px 10px; font-size: 12px; color: #fff; border-radius: 4px; transform: translateY(-50%); }
        .top-line { top: 20%; }
        .bottom-line { bottom: 10%; }

        .risk-low { color: #55ff55; font-weight: bold; }
        .risk-med { color: #ffff55; font-weight: bold; }
        .risk-high { color: #ff5555; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status-monitor">
        <div style="font-weight: bold; color: #fff;">KPM LATERAL ANALYSIS</div>
        <hr style="border: 0.5px solid #333; margin: 10px 0;">
        <div id="lateral-info" style="font-size: 18px; color: #00ffff; margin-bottom: 5px;">側面夾角: 偵測中...</div>
        <div id="lateral-risk" style="font-size: 15px;">風險: --</div>
    </div>

    <div class="guide-line top-line"><span class="guide-text">頭頂部對齊線</span></div>
    <div class="guide-line bottom-line"><span class="guide-text">請與螢幕保持 30 公分以上距離</span></div>

    <button id="start-btn">開始 KPM 側面評估</button>
    
    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script type="module">
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const btn = document.getElementById('start-btn');
        const latInfo = document.getElementById('lateral-info');
        const latRisk = document.getElementById('lateral-risk');

        const buffer = [];
        const B_SIZE = 12;

        function smooth(val) {
            buffer.push(val);
            if (buffer.length > B_SIZE) buffer.shift();
            return buffer.reduce((a, b) => a + b, 0) / buffer.length;
        }

        function getRiskLevel(angle) {
            const absAngle = Math.abs(angle);
            if (absAngle >= 15) return { label: "風險: 高 (High)", class: "risk-high" };
            if (absAngle >= 10) return { label: "風險: 中 (Medium)", class: "risk-med" };
            if (absAngle >= 5) return { label: "風險: 低 (Low)", class: "risk-low" };
            return { label: "風險: 正常", class: "" };
        }

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${file}`});
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        pose.onResults((results) => {
            if (canvasElement.width !== results.image.width) {
                canvasElement.width = results.image.width;
                canvasElement.height = results.image.height;
            }
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                const lms = results.poseLandmarks;
                
                // 判斷受測者是面向左還是面向右 (利用肩膀的 X 座標)
                // 這裡選取顯示最清楚的那一側
                const side = lms[11].visibility > lms[12].visibility ? 11 : 12; 
                const ear = side === 11 ? lms[7] : lms[8]; // 左耳或右耳
                const shoulder = lms[side];

                // 計算側面夾角：耳部與肩部連線，相對於垂直線的角度
                const dy = -(ear.y - shoulder.y);
                const dx = ear.x - shoulder.x;
                
                // 計算夾角 (以垂直線為 0 度)
                // atan2(dx, dy) 當 dx=0 代表完美垂直
                let angle_rad = Math.atan2(dx, dy);
                let angle_deg = angle_rad * 180 / Math.PI;

                const final_angle = smooth(angle_deg);
                
                // 判定前後 (考慮鏡像與側向)
                let direction = "中立";
                // 這裡的邏輯需要根據您的臨床試驗來校準
                if (final_angle > 2) direction = "頭部前傾 (Forward)";
                else if (final_angle < -2) direction = "頭部後傾 (Backward)";

                latInfo.innerText = `側面夾角: ${Math.abs(final_angle).toFixed(1)}°\n${direction}`;
                const risk = getRiskLevel(final_angle);
                latRisk.innerText = risk.label;
                latRisk.className = risk.class;

                // 繪製
                drawConnectors(canvasCtx, lms, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                
                // 繪製關鍵垂直基準線（通過肩膀）
                canvasCtx.beginPath();
                canvasCtx.moveTo(shoulder.x * canvasElement.width, 0);
                canvasCtx.lineTo(shoulder.x * canvasElement.width, canvasElement.height);
                canvasCtx.strokeStyle = 'rgba(255, 255, 0, 0.5)';
                canvasCtx.setLineDash([5, 5]);
                canvasCtx.stroke();

                // 繪製耳肩連線
                canvasCtx.beginPath();
                canvasCtx.moveTo(shoulder.x * canvasElement.width, shoulder.y * canvasElement.height);
                canvasCtx.lineTo(ear.x * canvasElement.width, ear.y * canvasElement.height);
                canvasCtx.strokeStyle = 'cyan';
                canvasCtx.setLineDash([]);
                canvasCtx.lineWidth = 3;
                canvasCtx.stroke();
            }
            canvasCtx.restore();
        });

        const camera = new Camera(videoElement, {onFrame: async () => await pose.send({image: videoElement}), width: 1280, height: 720});
        btn.onclick = () => { btn.style.display = 'none'; camera.start(); };
    </script>
</body>
</html>
